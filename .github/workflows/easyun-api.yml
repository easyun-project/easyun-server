name: Deploy to Dev Server (EC2)

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy easyun-server via SSM
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEPLOY_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo -u ec2-user bash -c \"cd /home/ec2-user/easyun-server && git pull origin master && find . -name __pycache__ -exec rm -rf {} + && test -f .env || cp .env.example .env && /home/ec2-user/.local/bin/uv sync\" && cp /home/ec2-user/easyun-server/deployment/easyun.service /etc/systemd/system/ && systemctl daemon-reload && systemctl restart easyun"]' \
            --comment "GitHub Actions deploy ${{ github.sha }}" \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          # Wait for command to complete
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --output text \
              --query "Status" 2>/dev/null || echo "Pending")

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --output text \
                --query "StandardErrorContent"
              exit 1
            fi

            sleep 5
          done

          echo "Deploy timed out"
          exit 1
