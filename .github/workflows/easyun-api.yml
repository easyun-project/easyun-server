name: Deploy to Dev Server (EC2)

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy easyun-server via SSM
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEPLOY_REGION }}

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo -u ec2-user bash -c \"cd /home/ec2-user/easyun-server && git pull origin master && /home/ec2-user/.local/bin/uv sync\" && cp /home/ec2-user/easyun-server/deployment/easyun.service /etc/systemd/system/ && systemctl daemon-reload && systemctl restart easyun"]' \
            --comment "GitHub Actions deploy" \
            --output text
